<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline - Aplikasi Kas</title>
    <meta name="theme-color" content="#1a237e">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a22 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        .offline-container {
            max-width: 380px;
            width: 100%;
            background: rgba(20, 30, 38, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 40px 28px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-wrapper {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(255,152,0,0.2), rgba(255,152,0,0.05));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            border: 2px solid rgba(255,152,0,0.3);
        }
        .icon { font-size: 48px; color: #ff9800; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 { font-size: 24px; font-weight: 700; color: #ff9800; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #ff9800; margin-bottom: 16px; letter-spacing: 1px; }
        p { color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 24px; font-size: 15px; }
        .info-box {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 28px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .info-item:last-child { margin-bottom: 0; }
        .info-item i { width: 24px; color: #ff9800; font-size: 16px; }
        .info-item span { font-size: 13px; color: rgba(255,255,255,0.8); }
        .btn-group { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            box-shadow: 0 4px 12px rgba(255,152,0,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(255,152,0,0.4); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .data-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
            margin-top: 12px;
        }
        .data-stats span { color: #ff9800; font-weight: 600; }
        @media (max-width: 480px) {
            .offline-container { padding: 30px 20px; }
            .btn-group { flex-direction: column; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon-wrapper">
            <i class="fas fa-wifi icon"></i>
        </div>
        <h1>Mode Offline</h1>
        <div class="subtitle">Aplikasi Kas</div>
        <p>Koneksi internet tidak tersedia. Anda masih dapat mengakses data yang sudah tersimpan secara lokal.</p>
        <div class="info-box">
            <div class="info-item"><i class="fas fa-database"></i><span>Data tersimpan di perangkat Anda</span></div>
            <div class="info-item"><i class="fas fa-sync-alt"></i><span>Akan sinkron otomatis saat online</span></div>
            <div class="info-item"><i class="fas fa-mobile-alt"></i><span>Aplikasi dapat digunakan tanpa internet</span></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="tryReconnect()"><i class="fas fa-sync-alt"></i> Coba Lagi</button>
            <button class="btn btn-secondary" onclick="goToApp()"><i class="fas fa-home"></i> Buka Aplikasi</button>
        </div>
    </div>
    <script>
        function tryReconnect() {
            if (navigator.onLine) {
                window.location.href = '/';
            } else {
                window.location.reload();
            }
        }
        function goToApp() {
            window.location.href = '/';
        }
        window.addEventListener('online', () => { window.location.href = '/'; });
    </script>
</body>
</html>
