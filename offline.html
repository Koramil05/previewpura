<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Kas Pura</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a192f;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .offline-container {
            max-width: 400px;
        }
        .icon {
            font-size: 80px;
            color: #ff9800;
            margin-bottom: 20px;
        }
        h1 {
            color: #ff9800;
            margin-bottom: 10px;
        }
        p {
            color: #90a4ae;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            background: #1a237e;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #283593;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon">📡</div>
        <h1>Anda Sedang Offline</h1>
        <p>Koneksi internet terputus. Aplikasi akan menampilkan data terakhir yang tersimpan. Silakan coba lagi saat koneksi pulih.</p>
        <button class="btn" onclick="window.location.reload()">🔄 Coba Lagi</button>
    </div>
</body>
</html>
